# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www2.garnet.edu.gh;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www2.garnet.edu.gh;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/www2.garnet.edu.gh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www2.garnet.edu.gh/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log /var/log/nginx/garnet_access.log;
    error_log /var/log/nginx/garnet_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Admin panel
    location /admin {
        try_files $uri @backend;
    }

    # API endpoints
    location /api {
        try_files $uri @backend;
    }

    # Storage files (uploaded images)
    location ^~ /storage {
        alias /var/www/backend/storage/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Nuxt static assets (CSS, JS)
    location /_nuxt/ {
        alias /var/www/garnet/frontend-public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Backend CSS assets (Filament)
    location ^~ /css/ {
        alias /var/www/backend/public/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Backend JS assets (Filament)
    location ^~ /js/ {
        alias /var/www/backend/public/js/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Livewire endpoints (required for Filament forms)
    location ^~ /livewire {
        try_files $uri @backend;
    }

    # Favicon and other static files
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        root /var/www/garnet/frontend-public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Backend PHP handler
    location @backend {
        fastcgi_pass localhost:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;

        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTPS on;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_read_timeout 300;
    }

    # Frontend (Nuxt) - Handle all other requests
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_redirect off;
    }
}